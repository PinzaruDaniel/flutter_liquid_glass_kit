name: flutter_liquid_glass_kit
description: iOS 26 Liquid Glass UI kit — native SwiftUI bridge on iOS, graceful glassmorphism fallback on Android.
version: 1.0.0
homepage: https://github.com/PinzaruDaniel/flutter_liquid_glass_kit
repository: https://github.com/PinzaruDaniel/flutter_liquid_glass_kit
issue_tracker: https://github.com/PinzaruDaniel/flutter_liquid_glass_kit/issues
topics:
  - liquid-glass
  - glassmorphism
  - ios
  - android
  - ui

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.19.0"

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: LiquidGlassKitPlugin
      android:
        package: com.danielpinzaru.flutter_liquid_glass_kit
        pluginClass: LiquidGlassKitPlugin

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
